apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tls-ingress
  namespace: catalog-tls
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.contoso.com
      secretName: app-contoso-com-tls
  rules:
    - host: app.contoso.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tls-gateway
  namespace: catalog-tls
spec:
  gatewayClassName: azure-alb-external
  listeners:
    - name: https
      hostname: app.contoso.com
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: app-contoso-com-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tls-route
  namespace: catalog-tls
spec:
  parentRefs:
    - name: tls-gateway
      sectionName: https
  hostnames:
    - app.contoso.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-service
          port: 80
