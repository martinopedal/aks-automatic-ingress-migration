apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weighted-traffic-primary
  namespace: catalog-weighted-traffic
spec:
  ingressClassName: nginx
  rules:
    - host: app.contoso.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-stable
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weighted-traffic-canary
  namespace: catalog-weighted-traffic
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10"
spec:
  ingressClassName: nginx
  rules:
    - host: app.contoso.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-canary
                port:
                  number: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: weighted-traffic-gateway
  namespace: catalog-weighted-traffic
spec:
  gatewayClassName: azure-alb-external
  listeners:
    - name: http
      hostname: app.contoso.com
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: weighted-traffic-route
  namespace: catalog-weighted-traffic
spec:
  parentRefs:
    - name: weighted-traffic-gateway
      sectionName: http
  hostnames:
    - app.contoso.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: app-stable
          port: 80
          weight: 90
        - name: app-canary
          port: 80
          weight: 10
