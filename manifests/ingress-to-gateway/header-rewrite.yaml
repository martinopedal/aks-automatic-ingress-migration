apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: header-rewrite-ingress
  namespace: catalog-header-rewrite
  annotations:
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto https;
spec:
  ingressClassName: nginx
  rules:
    - host: api.contoso.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: header-rewrite-gateway
  namespace: catalog-header-rewrite
spec:
  gatewayClassName: azure-alb-external
  listeners:
    - name: http
      hostname: api.contoso.com
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: header-rewrite-route
  namespace: catalog-header-rewrite
spec:
  parentRefs:
    - name: header-rewrite-gateway
      sectionName: http
  hostnames:
    - api.contoso.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: api
          port: 8080
